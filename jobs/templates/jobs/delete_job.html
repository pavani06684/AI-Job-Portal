{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4">
        <h3>Delete Job</h3>
        <p>
            Are you sure you want to delete
            <strong>{{ job.title }}</strong>
        </p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                Yes, Delete
            </button>
            <a href="{% url 'job_detail' job.id %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
